name: Send Daily Digest Email

on:
  push:
    branches:
      - main
    paths:
      - 'summaries/*.md'

jobs:
  send-email:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Send digest email
        run: |
          python3 << 'PYEOF'
          import os, json, subprocess, smtplib
          from email.mime.text import MIMEText

          result = subprocess.run(
              ['git', 'diff', '--name-only', 'HEAD~1', 'HEAD', '--', 'summaries/*.md'],
              capture_output=True, text=True
          )
          files = [f for f in result.stdout.strip().split('\n') if f]
          if not files:
              print("No summary file found"); exit(0)

          summary_file = files[0]
          date = os.path.basename(summary_file).replace('.md', '')

          with open(summary_file) as f:
              content = f.read()

          msg = MIMEText(content)
          msg['Subject'] = f'Cybersecurity News — {date}'
          msg['From'] = 'mihai.s.pop00@gmail.com'
          msg['To'] = 'mihai.s.pop00@gmail.com'

          with smtplib.SMTP_SSL('smtp.gmail.com', 465) as server:
              server.login('mihai.s.pop00@gmail.com', os.environ['GMAIL_APP_PASSWORD'])
              server.send_message(msg)
              print("Email sent successfully")
          PYEOF
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
